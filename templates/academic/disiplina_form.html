{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-10">
    <div class="mb-8">
        <a href="{% url 'disiplina_list' %}" class="text-sm font-bold text-emerald-600 hover:underline">← Fila Lista Disiplina</a>
        <h2 class="text-3xl font-black text-gray-900 mt-2">
            {% if disiplina %}Atualiza{% else %}Rejistu{% endif %} Disiplina
        </h2>
    </div>

    <div class="bg-white p-10 rounded-[40px] shadow-2xl shadow-gray-200 border border-gray-100">
        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Naran Disiplina</label>
                    <input type="text" name="naran_disiplina" 
                        value="{% if disiplina %}{{ disiplina.naran_disiplina }}{% else %}{{ naran_disiplina }}{% endif %}" 
                        required placeholder="Ex: Matematika"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 transition-all outline-none font-medium text-slate-700">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Kodigu Disiplina</label>
                    <input type="text" name="kodigu" 
                        value="{% if disiplina %}{{ disiplina.kodigu }}{% else %}{{ kodigu }}{% endif %}" 
                        required placeholder="Ex: MAT01"
                        class="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-emerald-100 focus:border-emerald-500 transition-all outline-none font-medium text-slate-700">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Hili Departamentu</label>
                <div class="grid grid-cols-3 gap-4">
                    <label class="relative cursor-pointer">
                        <input type="radio" name="departamentu" value="Geral" class="peer sr-only" 
                            {% if disiplina.departamentu == "Geral" or departamentu == "Geral" or not disiplina and not departamentu %}checked{% endif %}>
                        <div class="p-4 text-center bg-gray-50 border border-gray-200 rounded-2xl peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 transition-all font-bold">Geral</div>
                    </label>

                    <label class="relative cursor-pointer">
                        <input type="radio" name="departamentu" value="CN" class="peer sr-only" 
                            {% if disiplina.departamentu == "CN" or departamentu == "CN" %}checked{% endif %}>
                        <div class="p-4 text-center bg-gray-50 border border-gray-200 rounded-2xl peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 transition-all font-bold">CN</div>
                    </label>

                    <label class="relative cursor-pointer">
                        <input type="radio" name="departamentu" value="CSH" class="peer sr-only" 
                            {% if disiplina.departamentu == "CSH" or departamentu == "CSH" %}checked{% endif %}>
                        <div class="p-4 text-center bg-gray-50 border border-gray-200 rounded-2xl peer-checked:bg-emerald-600 peer-checked:text-white peer-checked:border-emerald-600 transition-all font-bold">CSH</div>
                    </label>
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-emerald-600 text-white py-5 rounded-[24px] font-black text-lg hover:bg-emerald-700 shadow-xl shadow-emerald-100 transition-all active:scale-95">
                {% if disiplina %}Atualiza Dadus{% else %}Guarda Disiplina{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
