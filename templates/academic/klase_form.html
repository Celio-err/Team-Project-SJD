{% extends 'base_dashboard.html' %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto px-4 py-12">
    <div class="mb-10">
        <h2 class="text-3xl font-bold text-slate-800">
            {% if klase %}Atualiza{% else %}Aumenta{% endif %} Klase {% if not klase %}Foun{% endif %}
        </h2>
        <p class="text-slate-500 text-sm mt-1">Prenxe informasaun sira iha okos hodi kria klase foun.</p>
    </div>

    <div class="bg-white rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
        <form method="POST" class="p-8 md:p-10 space-y-8">
            {% csrf_token %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Nivel</label>
                    <div class="relative">
                        <select name="nivel" required 
                            class="w-full pl-4 pr-10 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 appearance-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all outline-none">
                            <option value="" disabled {% if not klase %}selected{% endif %}>Hili Nivel</option>
                            {% for value, label in nivel_choices %}
                                <option value="{{ value }}" {% if klase.nivel == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                            {% endfor %}
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Departamentu</label>
                    <div class="relative">
                        <select name="departamentu" required 
                            class="w-full pl-4 pr-10 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold text-slate-700 appearance-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all outline-none">
                            <option value="" disabled {% if not klase %}selected{% endif %}>Hili Departamentu</option>
                            {% for value, label in dept_choices %}
                                <option value="{{ value }}" {% if klase.departamentu == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                            {% endfor %}
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-black text-slate-500 uppercase tracking-widest ml-1">Turma (Input)</label>
                <input type="text" name="turma" 
                    value="{{ klase.turma|default:'' }}" 
                    placeholder="Ezemplu: A, B, ka C" required
                    class="w-full px-4 py-3.5 bg-white border border-slate-200 rounded-xl font-bold text-slate-700 placeholder:text-slate-300 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/5 transition-all outline-none">
            </div>

            <div class="pt-4 flex flex-col sm:flex-row gap-3">
                <button type="submit" class="flex-1 py-4 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 active:scale-95">
                    {% if klase %}Atualiza Dadus{% else %}Rai Klase{% endif %}
                </button>
                <a href="{% url 'lista_klase' %}" class="flex-1 py-4 bg-slate-100 text-slate-600 text-center rounded-xl font-bold text-sm hover:bg-slate-200 transition-all">
                    Kansela
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
