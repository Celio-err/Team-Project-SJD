{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto p-8">
    <div class="bg-white rounded-[3rem] border border-slate-200 shadow-2xl p-10">
        <h2 class="text-3xl font-black text-slate-800 mb-2 uppercase">Input Valor Finalista</h2>
        <p class="text-slate-500 mb-8 border-b pb-6">Estudante: <span class="font-bold text-slate-900">{{ estudante.naran_kompletu }}</span> ({{ estudante.klase.departamentu }})</p>

        <form method="POST" class="space-y-6">
    {% csrf_token %}
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for d in disiplinas %}
        <div class="space-y-2 p-4 bg-slate-50 rounded-2xl border border-slate-100 hover:border-indigo-200 transition-all">
            <label class="text-xs font-bold text-slate-500 uppercase tracking-wider">
                {{ d.naran_disiplina }} 
                <span class="text-[10px] bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full ml-2">
                    {{ d.departamentu }}
                </span>
            </label>
            
            <input type="number" 
                   name="valor_{{ d.id }}" 
                   placeholder="Input valor..."
                   class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
        </div>
        {% endfor %}
    </div>

    <div class="pt-8">
    <!-- Gunakan button type submit agar data nilai tersimpan ke database -->
    <button type="submit" class="w-full py-4 bg-slate-900 text-white text-center rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl hover:bg-indigo-600 transform hover:-translate-y-1 transition-all">
         Generaliza ba Deklarasaun
    </button>
</div>
</form>
    </div>
</div>
{% endblock %}
