{% extends 'base.html' %}

{% block content %}
<div class="p-8">
    <h2 class="text-3xl font-black text-slate-800 mb-6 uppercase tracking-tight">Deklarasaun Finalista <span class="text-indigo-600">| Lista Klase 12</span></h2>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for k in klase %}
        <a href="{% url 'lista_estudante_finalista' k.id %}" class="group block p-6 bg-white border border-slate-200 rounded-3xl shadow-sm hover:shadow-xl hover:border-indigo-500 transition-all duration-300">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-2xl font-bold text-slate-900 group-hover:text-indigo-600 transition-colors">Klase {{ k.nivel }}</h3>
                    <p class="text-slate-500 font-medium">{{ k.departamentu }} - Turma {{ k.turma }}</p>
                </div>
                <div class="bg-slate-100 p-3 rounded-2xl group-hover:bg-indigo-50 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 5l7 7-7 7" />
                    </svg>
                </div>
            </div>
        </a>
        {% empty %}
        <p class="text-slate-500 italic">Data klase nivel 12 seidauk iha.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
